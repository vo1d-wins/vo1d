<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vo!d</title>
    <style>
        :root {
            --accent: #ffffff;
            --bg: #000000;
            --grid-color: rgba(255, 255, 255, 0.05);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            color: var(--accent);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: none; /* Hide default cursor */
        }

        /* --- MOVING GRID BACKGROUND --- */
        .grid-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            perspective: 600px;
            z-index: -1;
        }

        .grid {
            position: absolute;
            width: 200%;
            height: 200%;
            bottom: -50%;
            left: -50%;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90(deg), var(--grid-color) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: rotateX(45deg);
            animation: grid-move 10s linear infinite;
        }

        @keyframes grid-move {
            0% { transform: rotateX(45deg) translateY(0); }
            100% { transform: rotateX(45deg) translateY(50px); }
        }

        /* --- CUSTOM CIRCLE CURSOR --- */
        #cursor-dot {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
        }

        #cursor-outline {
            width: 30px;
            height: 30px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s, border-color 0.2s;
        }

        /* --- STATUS BAR --- */
        .status-bar {
            position: absolute;
            top: 30px;
            right: 40px;
            font-family: monospace;
            font-size: 0.75rem;
            color: #444;
            text-align: right;
            letter-spacing: 2px;
            z-index: 10;
        }
        .status-bar span { color: #fff; text-shadow: 0 0 5px #fff; }

        /* --- UI CONTAINER --- */
        .container {
            text-align: center;
            z-index: 5;
            width: 90%;
            max-width: 600px;
        }

        .logo-container img {
            width: 320px;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.3));
            margin-bottom: 10px;
        }

        .void-text {
            font-size: 0.7rem;
            letter-spacing: 12px;
            color: #555;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        /* --- SEARCH INPUT --- */
        .search-wrapper {
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        .search-wrapper:focus-within {
            border-color: #fff;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        input {
            width: 100%;
            padding: 20px;
            background: transparent;
            border: none;
            color: #fff;
            font-family: monospace;
            font-size: 1rem;
            text-align: center;
            outline: none;
            letter-spacing: 3px;
        }

        .links {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .links a {
            color: #333;
            text-decoration: none;
            font-size: 0.65rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .links a:hover { color: #fff; }

    </style>
</head>
<body>

    <div class="grid-container"><div class="grid"></div></div>
    
    <div id="cursor-dot"></div>
    <div id="cursor-outline"></div>

    <div class="status-bar">
        <div id="clock">00:00:00</div>
        <div id="date">--/--/--</div>
        <div>power ! <span id="bat-level">--%</span></div>
    </div>

    <div class="container">
        <div class="logo-container">
            <img src="logo.webp" alt="VO!D">
        </div>
        <div class="void-text">vo!d</div>
        
        <form id="search-form">
            <div class="search-wrapper">
                <input type="text" placeholder="search" id="search-input" autocomplete="off">
            </div>
        </form>

        <div class="links">
            <a href="https://google.com">google</a>
            <a href="https://youtube.com">youtube</a>
            <a href="https://discord.com">d!scord</a>
        </div>
    </div>

    <script>
        // --- CURSOR MOVEMENT ---
        const dot = document.getElementById('cursor-dot');
        const outline = document.getElementById('cursor-outline');

        document.addEventListener('mousemove', (e) => {
            dot.style.left = e.clientX + 'px';
            dot.style.top = e.clientY + 'px';
            
            // Outline follows with a tiny delay feel
            outline.animate({
                left: `${e.clientX}px`,
                top: `${e.clientY}px`
            }, { duration: 500, fill: "forwards" });
        });

        // Hover effect for cursor
        document.querySelectorAll('input, a').forEach(el => {
            el.onmouseenter = () => {
                outline.style.width = '50px';
                outline.style.height = '50px';
                outline.style.borderColor = '#fff';
            };
            el.onmouseleave = () => {
                outline.style.width = '30px';
                outline.style.height = '30px';
                outline.style.borderColor = 'rgba(255,255,255,0.5)';
            };
        });

        // --- STATS LOGIC ---
        function updateClock() {
            const d = new Date();
            document.getElementById('clock').textContent = d.toLocaleTimeString([], {hour12: false});
            document.getElementById('date').textContent = d.toLocaleDateString().toUpperCase();
        }
        setInterval(updateClock, 1000);
        updateClock();

        if (navigator.getBattery) {
            navigator.getBattery().then(bat => {
                const up = () => document.getElementById('bat-level').textContent = Math.round(bat.level * 100) + "%";
                up(); bat.onlevelchange = up;
            });
        }

        // --- SEARCH LOGIC ---
        const form = document.getElementById('search-form');
        const input = document.getElementById('search-input');
        form.onsubmit = (e) => {
            e.preventDefault();
            let url = input.value.trim();
            if(!url) return;
            if(!url.includes('.') || url.includes(' ')) {
                url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
            } else if (!url.startsWith('http')) {
                url = 'https://' + url;
            }
            window.location.href = '/service/' + btoa(url).replace(/\//g, '_').replace(/\+/g, '-').replace(/=/g, '');
        };
    </script>
</body>
</html>
